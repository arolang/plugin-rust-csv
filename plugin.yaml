name: plugin-rust-csv
version: 1.0.0
description: "A Rust plugin for CSV parsing and formatting"
author: "ARO Team"
license: MIT
aro-version: ">=0.1.0"

source:
  git: "git@github.com:arolang/plugin-rust-csv.git"
  ref: "main"

provides:
  - type: rust-plugin
    path: src/
    build:
      cargo-target: release
      output: target/release/libcsv_plugin.dylib
    actions:
      - name: ParseCSV
        role: own
        verbs: [parsecsv, readcsv]
        prepositions: [from, with]
        description: Parse CSV string into array of arrays
      - name: FormatCSV
        role: own
        verbs: [formatcsv, writecsv]
        prepositions: [from, with]
        description: Format array of arrays as CSV string
      - name: CSVToJSON
        role: own
        verbs: [csvtojson]
        prepositions: [from]
        description: Convert CSV to JSON array of objects

build:
  rust:
    minimum-version: "1.75"
